name: challenge_takip
description: Challenge Takip - habit tracker
publish_to: 'none'
version: 1.0.0+10

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  firebase_core: ^3.15.2
  firebase_crashlytics: ^4.1.0

  cupertino_icons: ^1.0.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  table_calendar: ^3.1.2
  fl_chart: ^0.69.2
  confetti: ^0.7.0

  google_sign_in: ^6.2.1
  googleapis: ^13.1.0
  googleapis_auth: ^2.0.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo.png
  min_sdk_android: 24
  adaptive_icon_background: "#EDEBE6"
  adaptive_icon_foreground: assets/logo.png